<button aria-label="Abrir menu" class="menu-toggle" type="button">☰</button></div>
</header>
<main class="container">
<a class="back" href="index.html">
    ← Voltar
   </a>
<section class="page-title">
<span class="pill">
     Builder
    </span>
<h1>
     Sidebar Builder
    </h1>
<p>
     Menus laterais para dashboard, admin, loja e SaaS.
    </p>
<div class="lab-highlights"><span>Preview ao vivo</span><span>Código copiável</span><span>Layout responsivo</span></div></section>
<section class="lab">
<aside class="panel">
<div class="group">
<h3>
       Aleatório
      </h3>
<button class="btn primary" id="randomSidebar">
       Criar aleatório
      </button>
</div>
<div class="group">
<h3>
       Conteúdo e estilo
      </h3>
<div class="control">
<label>
        Logo
       </label>
<input id="sLogo" value="AdminKit"/>
</div>
<div class="control">
<label>
        Links
       </label>
<textarea id="sLinks">Dashboard, Produtos, Clientes, Relatórios, Configurações</textarea>
</div>
<div class="control">
<label>
        Usuário
       </label>
<input id="sUser" value="Vitor Blocki"/>
</div>
<div class="control">
<label>
        Estilo
       </label>
<select id="sStyle">
<option value="dark">
         Dark
        </option>
<option value="light">
         Light
        </option>
<option value="glass">
         Glass
        </option>
<option value="premium">
         Premium
        </option>
<option value="contact">
         Contato
        </option>
<option value="checkout">
         Checkout
        </option>
<option value="feedback">
         Feedback
        </option>
</select>
</div>
<div class="control">
<label>
        Cor fundo
       </label>
<input id="sBg" type="color" value="#0b1220"/>
</div>
<div class="control">
<label>
        Cor destaque
       </label>
<input id="sAccent" type="color" value="#06b6d4"/>
</div>
</div>
<div class="group">
<h3>
       Layout
      </h3>
<div class="control">
<label>
        Radius
       </label>
<input id="radius" max="40" min="0" type="range" value="24"/>
</div>
<div class="control">
<label>
        Sombra
       </label>
<input id="shadow" max="80" min="0" type="range" value="40"/>
</div>
<div class="control">
<label>
        Animação
       </label>
<select id="anim">
<option value="fade">
         Fade
        </option>
<option value="slide">
         Slide
        </option>
<option value="float">
         Float
        </option>
<option value="pulse">
         Pulse
        </option>
</select>
</div>
</div>
</aside>
<section>
<div class="preview builder-preview">
<h2>
       Preview
      </h2>
<br/>
<div class="stage wide-stage" id="sidePreview">
</div>
</div>
<div class="codebox">
<button class="copy" onclick="copyCode('sCode',this)">
       Copiar código
      </button>
<pre id="sCode"></pre>
</div>
</section>
</section>
</main>
<script src="main.js">
</script>
<script src="lab-sidebar.js">
</script>
</body>
</html>
